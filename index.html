<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unstoppable You | Leadership & Faith</title>
    <style>
        :root {
            --navy: #0a192f;
            --orange: #ff8c00;
            --white: #ffffff;
        }
        body {
            background-color: var(--navy);
            color: var(--white);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .hero-container {
            padding: 20px;
            max-width: 900px;
        }
        h1 {
            font-size: 3rem;
            color: var(--orange);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 10px;
        }
        /* THIS IS THE CONTAINER FOR YOUR NEW PHOTO */
        .hero-image-box {
            width: 100%;
            max-width: 600px;
            margin: 20px auto;
            border: 2px solid var(--orange);
            box-shadow: 0 0 20px rgba(255, 140, 0, 0.3);
        }
        .hero-image-box img {
            width: 100%;
            display: block;
        }
        .message {
            font-size: 1.5rem;
            line-height: 1.6;
            margin-top: 20px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="hero-container">
        <h1>Unstoppable You</h1>
        <p>RESILLIENCE • FAITH • LEADERSHIP</p>

        <!-- THE STICKMAN IS GONE. PUT YOUR NEW IMAGE LINK BELOW -->
        <div class="hero-image-box">
            <img src="INSERT_SQUARESPACE_IMAGE_URL_HERE" alt="Leader helping another to the summit">
        </div>

        <div class="message">
            "Daily encouragement forged from 40+ years of leadership and faith. Whatever wall you face today—you were built to rise above it."
        </div>
    </div>

</body>
</html>
